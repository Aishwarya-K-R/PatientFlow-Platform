
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Auth Service
        run: |
          docker build -t aishwaryakr/auth-service -f Dockerfile.auth .
          docker push aishwaryakr/auth-service

      - name: Build & Push Patient Service
        run: |
          docker build -t aishwaryakr/patient-service -f Dockerfile.patient .
          docker push aishwaryakr/patient-service

      - name: Build & Push Billing Service
        run: |
          docker build -t aishwaryakr/billing-service -f Dockerfile.billing .
          docker push aishwaryakr/billing-service

      - name: Build & Push API Gateway
        run: |
          docker build -t aishwaryakr/api-gateway -f Dockerfile.gateway .
          docker push aishwaryakr/api-gateway
